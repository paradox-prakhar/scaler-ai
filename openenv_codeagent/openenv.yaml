# OpenEnv Task Registry and Environment Configuration
# --------------------------------------------------------

env:
  max_steps_default: 30
  executor_timeout_seconds: 15
  max_output_chars: 8192
  reward_config:
    test_pass_weight: 1.0
    bonus_all_pass: 0.5
    step_penalty: 0.01
    loop_penalty: 0.1
    regression_penalty: 0.2
    max_reward: 1.0
    min_reward: 0.0

tasks:
  - id: easy_fix_sum_bug
    module: tasks.easy.fix_sum_bug
    class: FixSumBugTask
    difficulty: easy

  - id: medium_add_feature
    module: tasks.medium.add_feature
    class: AddFeatureTask
    difficulty: medium

  - id: hard_optimize_sort
    module: tasks.hard.optimize_sort
    class: OptimizeSortTask
    difficulty: hard

baseline:
  model: gpt-4o
  temperature: 0
  max_tokens: 1024

ui:
  server_name: "0.0.0.0"
  server_port: 7860
  share: false
